<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="theme-color" content="#f8f9ff"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Asfa Claim"/>
<link rel="manifest" href="/manifest.json"/>
<link rel="apple-touch-icon" href="/icon-192.png"/>
<title>Asfa Claim v1.1.1</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f2f8;--bg2:#e8eaf2;--bg3:#fff;
  --b1:rgba(0,0,0,0.08);
  --t1:#1a1a2e;--t2:#4a4a6a;--t3:#9090b0;
  --ac:#5b3ff8;--ac2:#7c63ff;--acbg:rgba(91,63,248,0.08);
  --gr:#16a34a;--grbg:rgba(22,163,74,0.1);
  --rd:#dc2626;--rdbg:rgba(220,38,38,0.1);
  --am:#d97706;--ambg:rgba(217,119,6,0.1);
  --or:#ea6c00;
  --bl:#2563eb;
  --card:#ffffff;--shadow:0 2px 12px rgba(0,0,0,0.07);
}
body{background:var(--bg);color:var(--t1);font-family:Inter,sans-serif;min-height:100vh;padding-top:env(safe-area-inset-top,0px)}
.hdr{background:var(--card);border-bottom:1px solid var(--b1);padding:11px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;box-shadow:0 1px 6px rgba(0,0,0,0.06)}
.hdr-left{display:flex;align-items:center;gap:10px}
.hdr-logo{width:30px;height:30px;border-radius:7px;object-fit:cover}
.hdr-brand{font-size:15px;font-weight:700;color:var(--t1)}
.hdr-ver{font-size:10px;color:var(--t3);margin-left:4px}
.hdr-right{display:flex;gap:7px}
.bsg{background:var(--bg);border:1px solid var(--b1);color:var(--t2);padding:6px 13px;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:500;transition:.15s}
.bsg:hover{background:var(--bg2)}
.app{max-width:430px;margin:0 auto;padding:16px 16px 90px}
.card{background:var(--card);border-radius:16px;padding:20px;margin-bottom:12px;box-shadow:var(--shadow);border:1px solid var(--b1)}
.card-sm{background:var(--card);border-radius:12px;padding:13px 16px;margin-bottom:9px;box-shadow:0 1px 5px rgba(0,0,0,0.05);border:1px solid var(--b1)}
.login-wrap{display:flex;flex-direction:column;align-items:center;padding:30px 16px 20px;max-width:430px;margin:0 auto}
.logo-box{width:88px;height:88px;background:var(--acbg);border:2px solid rgba(91,63,248,0.2);border-radius:20px;display:flex;align-items:center;justify-content:center;margin-bottom:16px;box-shadow:0 4px 18px rgba(91,63,248,0.12)}
.logo-box img{width:68px;height:68px;object-fit:contain}
.login-title{font-size:24px;font-weight:700;color:var(--t1);margin-bottom:4px;text-align:center}
.login-div{width:32px;height:3px;background:linear-gradient(90deg,var(--ac),var(--or));border-radius:2px;margin:8px auto 6px}
.login-sub{color:var(--t2);font-size:13px;margin-bottom:24px;text-align:center}
.tabs{display:flex;background:var(--bg);border-radius:10px;padding:3px;margin-bottom:16px;border:1px solid var(--b1)}
.tab{flex:1;padding:9px;border:none;background:transparent;color:var(--t2);font-size:14px;font-weight:500;border-radius:8px;cursor:pointer;font-family:inherit;transition:.15s}
.tab.on{background:var(--card);color:var(--ac);box-shadow:0 1px 5px rgba(0,0,0,0.09);font-weight:600}
.atabs{display:flex;background:var(--bg);border-radius:12px;padding:3px;margin-bottom:14px;border:1px solid var(--b1);gap:3px}
.atab{flex:1;padding:10px 6px;border:none;background:transparent;color:var(--t2);font-size:13px;font-weight:500;border-radius:10px;cursor:pointer;font-family:inherit;transition:.15s;text-align:center}
.atab.on{background:var(--ac);color:#fff;box-shadow:0 2px 8px rgba(91,63,248,0.25);font-weight:600}
.atab.pc.on{background:linear-gradient(135deg,#7c3aed,var(--or))}
.lbl{font-size:12px;font-weight:600;color:var(--t2);display:block;margin-bottom:5px}
.inp{width:100%;background:var(--bg);border:1.5px solid var(--b1);border-radius:10px;color:var(--t1);padding:11px 14px;font-size:15px;font-family:inherit;outline:none;-webkit-appearance:none;appearance:none;transition:.15s}
.inp:focus{border-color:var(--ac);background:#fff}
.inp::placeholder{color:var(--t3)}
select.inp option{background:#fff;color:var(--t1)}
.fg{margin-bottom:13px}
.pass-wrap{position:relative}
.pass-wrap .inp{padding-right:44px}
.pass-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;color:var(--t3);font-size:18px;user-select:none;padding:4px}
.pass-eye:hover{color:var(--t2)}
.radio-group{display:flex;gap:8px;flex-wrap:wrap}
.radio-btn{flex:1;min-width:70px;padding:10px 10px;border:1.5px solid var(--b1);border-radius:10px;cursor:pointer;text-align:center;font-size:13px;font-weight:500;color:var(--t2);background:var(--bg);transition:.15s;font-family:inherit}
.radio-btn.on{border-color:var(--ac);background:var(--acbg);color:var(--ac)}
.btn{width:100%;padding:13px;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s}
.btn:active{transform:scale(.98)}
.bp{background:var(--ac);color:#fff;box-shadow:0 3px 10px rgba(91,63,248,0.25)}
.bp:hover{background:var(--ac2)}
.bp:disabled{opacity:.5;cursor:not-allowed}
.bg2{background:var(--bg);color:var(--t2);border:1.5px solid var(--b1)}
.bg2:hover{background:var(--bg2)}
.bgr{background:var(--gr);color:#fff}
.brd{background:var(--rd);color:#fff}
.bsm{padding:8px 13px;font-size:13px;width:auto;border-radius:9px}
.bdl{background:var(--acbg);color:var(--ac);border:1.5px solid rgba(91,63,248,0.2);padding:8px 13px;font-size:13px;width:auto;border-radius:9px;cursor:pointer;font-family:inherit;font-weight:500}
.sg2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:13px}
.sg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:13px}
.sg4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin-bottom:13px}
.stat{background:var(--card);border:1px solid var(--b1);border-radius:13px;padding:13px 8px;text-align:center;box-shadow:0 1px 5px rgba(0,0,0,0.04);position:relative;overflow:hidden}
.stat::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--ac),var(--ac2))}
.stat.gr::before{background:linear-gradient(90deg,var(--gr),#22c55e)}
.stat.rd::before{background:linear-gradient(90deg,var(--rd),#ef4444)}
.stat.am::before{background:linear-gradient(90deg,var(--am),#f59e0b)}
.stat.pc::before{background:linear-gradient(90deg,#7c3aed,var(--or))}
.stat-v{font-size:17px;font-weight:700;margin-bottom:2px;color:var(--t1)}
.stat-l{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.4px}
.chart-card{background:var(--card);border-radius:16px;padding:18px;margin-bottom:13px;box-shadow:var(--shadow);border:1px solid var(--b1)}
.chart-title{font-size:14px;font-weight:600;color:var(--t1);margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.bar-wrap{display:flex;align-items:flex-end;gap:5px;height:90px;margin-bottom:8px;padding-top:20px}
.bar{flex:1;background:linear-gradient(180deg,var(--ac),var(--ac2));border-radius:4px 4px 0 0;min-height:2px;transition:.3s}
.bar.pc{background:linear-gradient(180deg,#7c3aed,var(--or))}
.bar-labels{display:flex;gap:5px}
.bar-labels span{flex:1;font-size:9px;color:var(--t3);text-align:center}
.pch{background:linear-gradient(135deg,#5b3ff8,#7c63ff);border-radius:17px;padding:18px;margin-bottom:13px;color:#fff;position:relative;overflow:hidden;box-shadow:0 4px 18px rgba(91,63,248,0.25)}
.pch::before{content:"";position:absolute;top:-40px;right:-40px;width:110px;height:110px;background:rgba(255,255,255,.1);border-radius:50%}
.pch-lbl{font-size:11px;font-weight:600;opacity:.8;text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px}
.pch-amt{font-size:30px;font-weight:700;margin-bottom:3px}.pch-amt.neg{color:#fca5a5}
.pch-sub{font-size:11px;opacity:.7}
.prof-card{background:linear-gradient(135deg,var(--ac),var(--ac2));border-radius:17px;padding:18px;margin-bottom:13px;color:#fff;box-shadow:0 4px 18px rgba(91,63,248,0.22)}
.prof-avatar{width:48px;height:48px;background:rgba(255,255,255,.25);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;margin-bottom:9px}
.prof-name{font-size:19px;font-weight:700;margin-bottom:2px}
.prof-user{font-size:12px;opacity:.8}
.ci{background:var(--card);border:1px solid var(--b1);border-radius:13px;padding:14px;margin-bottom:9px;cursor:pointer;transition:.15s;box-shadow:0 1px 5px rgba(0,0,0,0.04)}
.ci:hover{box-shadow:0 3px 10px rgba(0,0,0,0.09);transform:translateY(-1px)}
.ci.pc-item{border-left:3px solid #7c3aed}
.ci.fuel-item{border-left:3px solid var(--or)}
.ci-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.ci-name{font-weight:600;font-size:14px;margin-bottom:2px;color:var(--t1)}
.ci-meta{font-size:11px;color:var(--t3);margin-top:2px}
.ci-amt{font-size:16px;font-weight:700;color:var(--ac);text-align:right;white-space:nowrap}
.bdg{display:inline-flex;align-items:center;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:600;margin-top:4px}
.bdg-p{background:var(--ambg);color:var(--am)}
.bdg-a{background:var(--grbg);color:var(--gr)}
.bdg-r{background:var(--rdbg);color:var(--rd)}
.bdg-paid{background:#dcfce7;color:#15803d}
.bdg-unpaid{background:#fef9c3;color:#854d0e}
.bgt-pc{background:#ede9fe;color:#5b21b6;border:1px solid #c4b5fd;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:600;display:inline-block;margin-top:3px}
.bgt-ot{background:#fff7ed;color:#c2410c;border:1px solid #fed7aa;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:600;display:inline-block;margin-top:3px}
.bgt-fuel{background:#fef3c7;color:#92400e;border:1px solid #fcd34d;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:600;display:inline-block;margin-top:3px}
.up-row{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.up-btn{background:var(--bg);border:1.5px dashed rgba(91,63,248,.25);border-radius:11px;padding:16px 8px;text-align:center;cursor:pointer;transition:.15s}
.up-btn:hover{border-color:var(--ac);background:var(--acbg)}
.up-icon{font-size:20px;margin-bottom:4px}
.up-lbl{font-size:12px;font-weight:500;color:var(--t2)}
.fr{display:flex;gap:5px;margin-bottom:13px;overflow-x:auto;padding-bottom:3px}
.chip{padding:6px 13px;border-radius:999px;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid var(--b1);background:var(--card);color:var(--t2);font-family:inherit;white-space:nowrap;transition:.15s}
.chip.on{background:var(--ac);border-color:var(--ac);color:#fff}
.ctype-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.ctype-grid.has3{grid-template-columns:1fr 1fr 1fr}
.ctype-btn{background:var(--card);border:2px solid var(--b1);border-radius:14px;padding:18px 10px;text-align:center;cursor:pointer;transition:.15s;box-shadow:0 1px 5px rgba(0,0,0,0.04)}
.ctype-btn:hover{border-color:var(--ac);box-shadow:0 3px 10px rgba(91,63,248,0.12)}
.ctype-icon{font-size:26px;margin-bottom:7px}
.ctype-label{font-size:13px;font-weight:600;color:var(--t1)}
.ctype-sub{font-size:10px;color:var(--t3);margin-top:2px}
.sh{display:flex;justify-content:space-between;align-items:center;margin-bottom:11px}
.st{font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:11px}
.nb{background:var(--acbg);color:var(--ac);border:1.5px solid rgba(91,63,248,.2);padding:7px 13px;font-size:12px;font-weight:600;border-radius:8px;cursor:pointer;font-family:inherit}
.err{color:var(--rd);font-size:13px;margin-top:7px}
.succ{color:var(--gr);font-size:13px;margin-top:7px}
.toast{position:fixed;top:calc(env(safe-area-inset-top,0px)+56px);left:50%;transform:translateX(-50%);z-index:999;color:#fff;padding:10px 20px;border-radius:999px;font-size:13px;font-weight:500;white-space:nowrap;opacity:0;transition:opacity .3s;pointer-events:none;min-width:140px;text-align:center}
.toast.show{opacity:1}
.empty{text-align:center;padding:36px 20px;color:var(--t3)}
.detail{border-top:1px solid var(--b1);margin-top:12px;padding-top:12px}
.ar{display:flex;gap:8px;margin-top:10px}
.rn{margin-top:9px;font-size:12px;color:var(--t2);padding:9px 13px;background:var(--bg);border-radius:9px;border:1px solid var(--b1)}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--b1)}
.info-row:last-child{border-bottom:none}
.info-lbl{font-size:12px;color:var(--t2)}
.info-val{font-size:13px;font-weight:600;color:var(--t1)}
.calc-box{background:var(--acbg);border:1.5px solid rgba(91,63,248,.15);border-radius:12px;padding:14px;margin-top:10px;text-align:center}
.calc-amt{font-size:26px;font-weight:700;color:var(--ac)}
.calc-lbl{font-size:11px;color:var(--t2);margin-top:2px}
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--card);border-top:1px solid var(--b1);padding:7px 0 calc(7px + env(safe-area-inset-bottom,0px));display:flex;justify-content:space-around;max-width:430px;margin:0 auto;box-shadow:0 -2px 8px rgba(0,0,0,0.05)}
.bn{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 20px;border-radius:9px;border:none;background:transparent;color:var(--t3);font-family:inherit}
.bn.on{color:var(--ac)}
.bn-icon{font-size:19px}
.bn-lbl{font-size:10px;font-weight:500}
.mfilt{display:flex;gap:7px;align-items:center;margin-bottom:13px;flex-wrap:wrap}
.mfilt select{background:var(--card);border:1.5px solid var(--b1);border-radius:8px;color:var(--t1);padding:7px 10px;font-size:13px;font-family:inherit;outline:none;cursor:pointer}
.anav{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:13px}
.anavbtn{background:var(--card);border:1.5px solid var(--b1);border-radius:12px;padding:13px;text-align:center;cursor:pointer;font-family:inherit;color:var(--t2);font-size:12px;font-weight:500;transition:.15s;box-shadow:0 1px 4px rgba(0,0,0,0.04)}
.anavbtn:hover{border-color:var(--ac);color:var(--ac);background:var(--acbg)}
.anavbtn-icon{font-size:18px;margin-bottom:4px}
.ibb{background:var(--acbg);border:1.5px solid rgba(91,63,248,.2);border-radius:12px;padding:11px 15px;margin-bottom:13px;display:flex;justify-content:space-between;align-items:center;gap:12px}
.ibb-t{font-size:13px;color:var(--t2);flex:1}
.ibb-t strong{color:var(--t1);display:block;margin-bottom:1px}
.ibb-btn{background:var(--ac);color:#fff;border:none;padding:7px 13px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.update-banner{background:#fef3c7;border:1.5px solid #fcd34d;border-radius:12px;padding:11px 15px;margin-bottom:13px;display:flex;justify-content:space-between;align-items:center;gap:12px}
.update-banner span{font-size:13px;color:#92400e;font-weight:500}
.update-btn{background:#d97706;color:#fff;border:none;padding:7px 13px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.page-title{font-size:18px;font-weight:700;color:var(--t1);margin-bottom:15px}
.ver-badge{position:fixed;bottom:calc(56px + env(safe-area-inset-bottom,0px));right:12px;background:rgba(0,0,0,.08);color:var(--t3);font-size:10px;padding:3px 8px;border-radius:999px;z-index:50}
.notif-item{padding:12px 14px;border-bottom:1px solid var(--b1);cursor:pointer;transition:.15s}
.notif-item:hover{background:var(--bg)}
.notif-item:last-child{border-bottom:none}
.notif-item.unread{background:var(--acbg)}
.notif-title{font-size:13px;font-weight:600;color:var(--t1);margin-bottom:2px}
.notif-sub{font-size:11px;color:var(--t2)}
.notif-time{font-size:10px;color:var(--t3);margin-top:3px}
</style>
</head>

if("serviceWorker"in navigator){
  navigator.serviceWorker.register("/sw.js").then(reg=>{
    reg.addEventListener("updatefound",()=>{
      const nw=reg.installing;
      nw.addEventListener("statechange",()=>{
        if(nw.state==="installed"&&navigator.serviceWorker.controller){
          swUpdateAvailable=true;showBanners();
        }
      });
    });
  }).catch(()=>{});
}
window.doUpdate=()=>{
  if("serviceWorker"in navigator){
    navigator.serviceWorker.getRegistration().then(reg=>{
      if(reg&&reg.waiting){reg.waiting.postMessage({type:"SKIP_WAITING"});}
      window.location.reload(true);
    });
  }else{window.location.reload(true);}
};

function showBanners(){
  const el=document.getElementById("banners");
  if(!el)return;
  let html="";
  if(swUpdateAvailable)html+=`<div class="update-banner"><span>🆕 Versi baru tersedia!</span><button class="update-btn" onclick="doUpdate()">Kemaskini</button></div>`;
  if(deferredPrompt)html+=`<div class="ibb"><div class="ibb-t"><strong>Install Apps</strong>Tambah ke home screen</div><button class="ibb-btn" onclick="installApp()">Install</button></div>`;
  el.innerHTML=html;
}

// Upload receipts stored as base64 locally, uploaded to Cloudinary on submit
function compressImage(file,cb){
  const r=new FileReader();
  r.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      const c=document.createElement("canvas");
      let w=img.width,h=img.height,M=1200;
      if(w>M){h=h*M/w;w=M;}if(h>M){w=w*M/h;h=M;}
      c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);
      cb(c.toDataURL("image/jpeg",0.8));
    };
    img.src=ev.target.result;
  };
  r.readAsDataURL(file);
}

async function uploadToCloudinary(base64data,claimTypeStr){
  const months=["Jan","Feb","Mac","Apr","Mei","Jun","Jul","Ogs","Sep","Okt","Nov","Dis"];
  // Use user's claim date from form
  const claimDateVal=document.getElementById("fDate")?.value;
  const dateObj=claimDateVal?new Date(claimDateVal):new Date();
  const monthStr=dateObj.getFullYear()+"-"+String(dateObj.getMonth()+1).padStart(2,"0")+"-"+months[dateObj.getMonth()];
  let typeFolder="resit";
  if(claimTypeStr==="fuel")typeFolder="minyak_toll";
  else if(claimTypeStr==="pettycash")typeFolder="petty_cash";
  else if(claimTypeStr==="expense")typeFolder="expense_track";
  const folder=`asfa_claim/${typeFolder}/${monthStr}`;
  const formData=new FormData();
  // Convert base64 to blob
  const res2=await fetch(base64data);
  const blob=await res2.blob();
  formData.append("file",blob,"receipt.jpg");
  formData.append("upload_preset","asfa_claim");
  formData.append("folder",folder);
  const res=await fetch("https://api.cloudinary.com/v1_1/drngqgpqf/image/upload",{method:"POST",body:formData});
  const data=await res.json();
  if(data.secure_url)return data.secure_url;
  throw new Error(data.error?.message||"Upload failed");
}

  if(!fc||!fg)return;

};


function setupFileInputs(){
  const fc=document.getElementById("fcam"),fg=document.getElementById("fgal");
  if(!fc||!fg)return;
  fc.onchange=e=>{
    const f=e.target.files[0];if(!f)return;
    const which=parseInt(fc.dataset.which||"1");
    compressImage(f,data=>{
      if(which===2)receipt2=data;else receipt=data;
      updateUA();
    });
    fc.value="";
  };
  fg.onchange=e=>{
    const f=e.target.files[0];if(!f)return;
    const which=parseInt(fg.dataset.which||"1");
    compressImage(f,data=>{
      if(which===2)receipt2=data;else receipt=data;
      updateUA();
    });
    fg.value="";
  };
}

// ===== SAVE FORM VALUES =====
function saveFormVals(type){
  const g=id=>document.getElementById(id)?.value||"";
  if(type==="resit"||type==="all"){FS.resit={date:g("fDate"),amount:g("fAmt"),cat:g("fCat"),purpose:g("fPurpose"),notes:g("fNotes")};}
  if(type==="fuel"||type==="all"){FS.fuel={date:g("fDate"),km:g("fKm"),dest:g("fDest"),cat:g("fCat"),purpose:g("fPurpose"),notes:g("fNotes"),toll:g("fToll")};}
  if(type==="pc"||type==="all"){FS.pc={date:g("fDate"),amount:g("fAmt"),cat:g("fCat"),purpose:g("fPurpose"),notes:g("fNotes")};}
}
function restoreFormVals(type,f){
  const s=id=>v=>{const el=document.getElementById(id);if(el&&v)el.value=v;};
  if(type==="resit"){s("fDate")(f.date);s("fAmt")(f.amount);s("fCat")(f.cat);s("fPurpose")(f.purpose);s("fNotes")(f.notes);}
  if(type==="fuel"){s("fDate")(f.date);s("fKm")(f.km);s("fDest")(f.dest);s("fCat")(f.cat);s("fPurpose")(f.purpose);s("fNotes")(f.notes);s("fToll")(f.toll);}
  if(type==="pc"){s("fDate")(f.date);s("fAmt")(f.amount);s("fCat")(f.cat);s("fPurpose")(f.purpose);s("fNotes")(f.notes);}
}

function toast(m,t="ok"){const el=document.getElementById("toast");el.textContent=m;el.classList.add("show");el.style.background=t==="err"?"#dc2626":"#1a1a2e";setTimeout(()=>el.classList.remove("show"),3000);}
function getCU(){if(!session||session.type!=="user")return null;return users.find(u=>u.name===session.name)||null;}
function fmtRM(v){const n=parseFloat(v)||0;return(n<0?"-RM "+Math.abs(n).toFixed(2):"RM "+n.toFixed(2));}
function fmtDate(d){if(!d)return"";const p=d.split("-");return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:d;}
function getMonths(){return["Jan","Feb","Mac","Apr","Mei","Jun","Jul","Ogs","Sep","Okt","Nov","Dis"];}
function parseTS(ts){
  if(!ts)return null;
  try{
    if(ts.toDate)return ts.toDate();
    if(ts.seconds)return new Date(ts.seconds*1000);
    if(typeof ts==="string")return new Date(ts);
    if(typeof ts==="number")return new Date(ts);
    return null;
  }catch(e){return null;}
}
function filterClaims(list){
  return list.filter(c=>{
    // Use user's claim date (c.date) first, fallback to submittedAt
    let d=null;
    if(c.date){
      try{d=new Date(c.date);}catch(e){}
    }
    if(!d)d=parseTS(c.submittedAt);
    if(!d)return true;
    if(filterMode==="month")return d.getMonth()+1===filterMonth&&d.getFullYear()===filterYear;
    return d.getFullYear()===filterYear;
  });
}
function calcFuel(km,veh,dir){const rate=veh==="motor"?fuelRates.motor:fuelRates.kereta;return parseFloat(km)*(dir==="duahala"?2:1)*rate;}
function togglePass(id){const inp=document.getElementById(id);if(inp)inp.type=inp.type==="password"?"text":"password";}
window.togglePass=togglePass;

function rEditClaim(){
  const c=claims.find(x=>x.id===editingClaimId);
  if(!c)return`<div class="app"><div class="empty">Claim tidak dijumpai</div></div>`;
  const cats=categories.map(cat=>`<option value="${cat.name}" ${cat.name===c.category?"selected":""}>${cat.name}</option>`).join("");
  const isFuel=c.claimType==="fuel";
  const isPC=c.claimType==="pettycash";
  return`<div class="app">
  <div class="page-title">✏️ Edit Claim</div>
  <div class="card" style="background:var(--ambg);border-color:rgba(217,119,6,.3)">
    <div style="font-size:13px;color:var(--am);font-weight:500">⚠️ Hanya boleh edit claim yang masih Pending</div>
  </div>
  ${!isFuel&&!isPC?`
  <div class="card">
    <div class="fg"><span class="lbl">Tarikh *</span><input id="eFDate" type="date" class="inp" value="${c.date||""}"/></div>
    <div class="fg"><span class="lbl">Jumlah (RM) *</span><input id="eFAmt" type="number" class="inp" value="${c.amount||""}" min="0" step="0.01" inputmode="decimal"/></div>
    <div class="fg"><span class="lbl">Kategori</span><select id="eFCat" class="inp">${cats}</select></div>
    <div class="fg"><span class="lbl">Tujuan *</span><input id="eFPurpose" type="text" class="inp" value="${c.purpose||""}"/></div>
    <div class="fg"><span class="lbl">Nota</span><textarea id="eFNotes" class="inp" rows="2" style="resize:none">${c.notes||""}</textarea></div>
    <button class="btn bp" onclick="saveEditClaim()">Simpan Perubahan</button>
  </div>`:`
  <div class="card">
    <div class="fg"><span class="lbl">Tarikh *</span><input id="eFDate" type="date" class="inp" value="${c.date||""}"/></div>
    ${isFuel?`
    <div class="fg"><span class="lbl">Destinasi</span><input id="eFDest" type="text" class="inp" value="${c.destination||""}"/></div>
    <div class="fg"><span class="lbl">Kilometer</span><input id="eFKm" type="number" class="inp" value="${c.km||""}" min="0" step="0.1" inputmode="decimal"/></div>`:`
    <div class="fg"><span class="lbl">Jumlah (RM) *</span><input id="eFAmt" type="number" class="inp" value="${c.amount||""}" min="0" step="0.01" inputmode="decimal"/></div>`}
    <div class="fg"><span class="lbl">Kategori</span><select id="eFCat" class="inp">${cats}</select></div>
    <div class="fg"><span class="lbl">Tujuan *</span><input id="eFPurpose" type="text" class="inp" value="${c.purpose||""}"/></div>
    <div class="fg"><span class="lbl">Nota</span><textarea id="eFNotes" class="inp" rows="2" style="resize:none">${c.notes||""}</textarea></div>
    <button class="btn bp" onclick="saveEditClaim()">Simpan Perubahan</button>
  </div>`}
  </div>`;
}

function render(){
  const hdr=document.getElementById("hdr"),hdrR=document.getElementById("hdrR"),bnavEl=document.getElementById("bnav"),vb=document.getElementById("verBadge");
  const subPages=["adminUsers","adminSettings","adminPC","adminCats","adminFuel","adminGeneral","about"];
  const isSubPage=subPages.includes(view);
  const isFormPage=["newClaim","newClaimFuel","newClaimPC","selectClaim"].includes(view);
  const nw=document.getElementById("notifWrap");
  if(!session){hdr.style.display="none";bnavEl.style.display="none";if(vb)vb.style.display="none";if(nw)nw.style.display="none";}
  else if(session.type==="admin"){
    hdr.style.display="flex";bnavEl.style.display="none";if(vb)vb.style.display="none";if(nw){nw.style.display="flex";nw.style.removeProperty("display");nw.style.display="block";}
    let h=(isSubPage||isFormPage)?`<button class="bsg" onclick="goBack()">← Balik</button>`:"";
    h+=`<button class="bsg" onclick="logout()">Keluar</button>`;hdrR.innerHTML=h;
  }else{
    hdr.style.display="flex";bnavEl.style.display=isFormPage?"none":"flex";if(vb)vb.style.display="block";if(nw)nw.style.display="block";
    let h=(isFormPage||isSubPage)?`<button class="bsg" onclick="goBack()">← Balik</button>`:"";
    hdrR.innerHTML=h;
    [0,1,2].forEach(i=>{const b=document.getElementById(`bn${i}`);if(b)b.className="bn"+(bnav===i?" on":"");});
  }
  const root=document.getElementById("mainRoot");
  try{
    if(view==="login")root.innerHTML=rLogin();
    else if(view==="dashboard")root.innerHTML=rDash();
    else if(view==="allClaims")root.innerHTML=rAllClaims();
    else if(view==="userProfile")root.innerHTML=rProfile();
    else if(view==="about")root.innerHTML=rAbout();
    else if(view==="selectClaim")root.innerHTML=rSelect();
    else if(view==="newClaim")root.innerHTML=rResit();
    else if(view==="newClaimFuel")root.innerHTML=rFuelForm();
    else if(view==="newClaimPC")root.innerHTML=rPCForm();
    else if(view==="newClaimExpense")root.innerHTML=rExpenseForm();
    else if(view==="claimSuccess")root.innerHTML=rSuccess();
    else if(view==="editClaim")root.innerHTML=rEditClaim();
    else if(view==="adminUsers"){if(session?.type==="admin"&&!viewerMode)root.innerHTML=rUsers();else{view="dashboard";viewerMode=false;render();}}
    else if(view==="adminSettings"){if(session?.type==="admin"&&!viewerMode)root.innerHTML=rSettings();else{view="dashboard";viewerMode=false;render();}}
    else if(view==="adminPC"){if(session?.type==="admin"&&!viewerMode)root.innerHTML=rManagePC();else{view="dashboard";viewerMode=false;render();}}
    else if(view==="adminCats"){if(session?.type==="admin"&&!viewerMode)root.innerHTML=rCats();else{view="dashboard";viewerMode=false;render();}}
    else if(view==="adminFuel"){if(session?.type==="admin"&&!viewerMode)root.innerHTML=rFuelRates();else{view="dashboard";viewerMode=false;render();}}
    else if(view==="adminGeneral"){if(session?.type==="admin"&&!viewerMode)root.innerHTML=rGeneral();else{view="dashboard";viewerMode=false;render();}}
    else if(view==="admin"){
      const isViewer=viewerMode&&session?.type==="user"&&(settings.viewers||[]).includes(session.name);
      if(session?.type==="admin"||isViewer)root.innerHTML=rAdmin();
      else{view="dashboard";viewerMode=false;render();}
    }
  }catch(e){root.innerHTML=`<div style="color:var(--rd);padding:20px;font-size:13px">Error: ${e.message}</div>`;console.error(e);}
  setTimeout(()=>{
    setupFileInputs();
    updateUA();
    updateNotifBadge();
    // Event delegation for ctype buttons
    const grid=document.getElementById("ctypeGrid");
    if(grid){
      grid.onclick=e=>{
        const btn=e.target.closest("[data-type]");
        if(btn)startClaim(btn.dataset.type);
      };
    }
  },50);
}

function rAdmin(){
  const isPC=atab==="pettycash";
  const isExpense=atab==="expense";
  const months=getMonths();
  // Filter by tab
  let tabClaims=[];
  if(atab==="resit")tabClaims=claims.filter(c=>c.claimType==="resit");
  else if(atab==="fuel")tabClaims=claims.filter(c=>c.claimType==="fuel");
  else if(atab==="pettycash")tabClaims=claims.filter(c=>c.claimType==="pettycash"||c.budget==="pettycash");
  else if(atab==="expense")tabClaims=claims.filter(c=>c.claimType==="expense"||c.budget==="expense");
  // Legacy: also check claims with no claimType for old data
  if(atab==="resit")tabClaims=tabClaims.concat(claims.filter(c=>!c.claimType&&c.budget!=="pettycash"&&c.budget!=="expense"));
  
  const tFilt=filterClaims(tabClaims);
  const tList=filt==="all"?tFilt:tFilt.filter(c=>c.status===filt);
  const tApv=tFilt.filter(c=>c.status==="approved").reduce((s,c)=>s+(c.amount||0),0);
  const tPend=tFilt.filter(c=>c.status==="pending").length;
  const tRej=tFilt.filter(c=>c.status==="rejected").reduce((s,c)=>s+(c.amount||0),0);
  // For backward compatibility with PC display block
  const pFilt=tFilt;
  const pApv=tApv,pPend=tPend,pRej=tRej;
  const otherC=tabClaims;
  const oFilt=tFilt,oApv=tApv,oPend=tPend,oRej=tRej,oList=tList;
  const pList=pcFilt==="all"?tFilt:tFilt.filter(c=>c.status===pcFilt);
  // Bar chart
  const barData=[];
  if(chartMode==="6bulan"){
    const startM=chartHalf==="first"?1:7;
    for(let i=0;i<6;i++){
      const m=startM+i,y=filterYear;
      const t=otherC.filter(c=>{
        if(!c.submittedAt)return false;
        let cd=null;if(c.date){try{cd=new Date(c.date);}catch(e){}}if(!cd)cd=parseTS(c.submittedAt);return cd&&cd.getMonth()+1===m&&cd.getFullYear()===y&&c.status==="approved";
      }).reduce((s,c)=>s+(c.amount||0),0);
      barData.push({label:months[m-1],total:t});

        if(!c.submittedAt)return false;

// ===== CLAIM CARD =====
function cCard(c,isAdmin){
  const isOpen=expanded===c.id;
  const bT=c.status==="pending"?"⏳ Pending":c.status==="approved"?"✓ Lulus":"✕ Ditolak";
  const bdgC=`bdg-${c.status==="pending"?"p":c.status==="approved"?"a":"r"}`;
  const isPC=c.claimType==="pettycash"||c.budget==="pettycash";
  const isFuel=c.claimType==="fuel";
  const isExpense=c.claimType==="expense"||c.budget==="expense";
  const u=isAdmin?users.find(x=>x.name===c.user):null;
  const dName=isAdmin?(u?.fullName?`${u.fullName} (@${c.user})`:c.user):c.purpose;
  const paidB=(!isPC&&!isExpense&&c.paid)?`<span class="bdg bdg-paid">💚 Paid</span>`:(!isPC&&!isExpense&&!c.paid)?`<span class="bdg bdg-unpaid">⏳ Unpaid</span>`:"";
  const typeB=isPC?`<span class="bgt-pc">💰 Petty Cash</span>`:isFuel?`<span class="bgt-fuel">⛽ Minyak</span>`:isExpense?`<span class="bgt-ot" style="background:#fef3c7;color:#92400e;border-color:#fcd34d">📊 Expense</span>`:`<span class="bgt-ot">🧾 Resit</span>`;
  let det="";
  if(isOpen){
    det=`<div class="detail" onclick="event.stopPropagation()">`;
    if(isAdmin){det+=`<div class="info-row"><span class="info-lbl">Pengguna</span><span class="info-val">${c.user}</span></div>`;if(u?.fullName)det+=`<div class="info-row"><span class="info-lbl">Nama Penuh</span><span class="info-val">${u.fullName}</span></div>`;}
    det+=`<div class="info-row"><span class="info-lbl">Tarikh</span><span class="info-val">${fmtDate(c.date)}</span></div>`;
    det+=`<div class="info-row"><span class="info-lbl">Jumlah</span><span class="info-val">${fmtRM(c.amount)}</span></div>`;
    if(isFuel){
      det+=`<div class="info-row"><span class="info-lbl">Kenderaan</span><span class="info-val">${c.vehicle==="motor"?"🏍️ Motor":"🚗 Kereta"}</span></div>`;
      det+=`<div class="info-row"><span class="info-lbl">Destinasi</span><span class="info-val">${c.destination||"-"}</span></div>`;
      det+=`<div class="info-row"><span class="info-lbl">KM</span><span class="info-val">${c.km||0}km (${c.direction==="duahala"?"Dua Hala":"Sehala"})</span></div>`;
      det+=`<div class="info-row"><span class="info-lbl">Rate</span><span class="info-val">RM${c.rate||0}/km</span></div>`;
      if(c.tollAmount)det+=`<div class="info-row"><span class="info-lbl">Toll</span><span class="info-val">${fmtRM(c.tollAmount)}</span></div>`;
    }
    det+=`<div class="info-row"><span class="info-lbl">Kategori</span><span class="info-val">${c.category||"-"}</span></div>`;
    det+=`<div class="info-row"><span class="info-lbl">Tujuan</span><span class="info-val">${c.purpose||"-"}</span></div>`;
    if(c.notes)det+=`<div style="font-size:13px;color:var(--t2);margin:9px 0 3px">📝 ${c.notes}</div>`;
    const rData=receiptMap[c.id]||c.receipt;
    if(rData){
      const isCloud=typeof rData==="string"&&rData.startsWith("http");
      det+=`<div style="margin:8px 0 4px"><span style="font-size:11px;font-weight:600;${isCloud?"background:#dcfce7;color:#15803d":"background:#fef9c3;color:#854d0e"};padding:3px 10px;border-radius:999px">${isCloud?"☁️ Tersimpan di Cloud":"📱 Gambar Tempatan"}</span></div>
      <img src="${rData}" style="width:100%;border-radius:9px;margin:4px 0 8px;max-height:210px;object-fit:cover"/>
      <div style="margin-bottom:9px"><button class="bdl" onclick="event.stopPropagation();dlImgById('${c.id}')">⬇ Download Resit</button></div>`;
    }else{
      det+=`<div style="margin:8px 0"><span style="font-size:11px;font-weight:600;background:#f1f5f9;color:#64748b;padding:3px 10px;border-radius:999px">📎 Tiada Gambar</span></div>`;
    }
    if(c.receipt2)det+=`<div style="font-size:12px;font-weight:600;color:var(--t2);margin-top:8px">Resit Toll:</div><img src="${c.receipt2}" style="width:100%;border-radius:9px;margin:6px 0;max-height:170px;object-fit:cover"/>`;
    if(isAdmin&&!viewerMode){
      det+=`<div style="margin-top:10px;display:flex;gap:7px;flex-wrap:wrap">`;
      if(c.status==="pending"){
        if(rejectFor===c.id){
          det+=`<div style="width:100%"><span class="lbl">Sebab penolakan</span><input id="rNote" type="text" class="inp" placeholder="(Optional)" style="margin-bottom:7px"/>
          <div class="ar"><button class="btn brd bsm" style="flex:1" onclick="event.stopPropagation();doReject('${c.id}')">Sahkan Tolak</button>
          <button class="btn bg2 bsm" style="flex:1" onclick="event.stopPropagation();clrReject()">Batal</button></div></div>`;
        }else{
          det+=`<button class="btn bgr bsm" onclick="event.stopPropagation();doApprove('${c.id}','${isPC?"pettycash":"other"}',${c.amount||0})">✓ Luluskan</button>
          <button class="btn brd bsm" onclick="event.stopPropagation();setReject('${c.id}')">✕ Tolak</button>`;
        }
      }
      if(!isPC&&!isExpense)det+=`<button class="btn bg2 bsm" onclick="event.stopPropagation();togPaid('${c.id}',${!!c.paid})">${c.paid?"Tandakan Unpaid":"💚 Tandakan Paid"}</button>`;
      det+=`<button class="btn bg2 bsm" style="color:var(--rd)" onclick="event.stopPropagation();delClaim('${c.id}')">🗑️ Padam</button>`;
      det+=`</div>`;
    }
    // User can edit/withdraw their own pending claims

window.doApprove=async(id,budget,amount)=>{
  const c=claims.find(x=>x.id===id);
  await updateDoc(doc(db,"claims",id),{status:"approved",reviewNote:""});
  if(budget==="pettycash"&&c){
    // Check if claim date is current month/year
    const cd=c.date?new Date(c.date):new Date();
    const now=new Date();
    const isCurrent=cd.getMonth()===now.getMonth()&&cd.getFullYear()===now.getFullYear();
    if(isCurrent){
      const nb=(pc.balance||0)-parseFloat(amount);
      await setDoc(doc(db,"settings","pettycash"),{...pc,balance:nb});
    }
  }
  if(c)await sendNotif(c.user,"✅ Claim Diluluskan",`Claim "${c.purpose}" berjumlah ${fmtRM(c.amount)} telah diluluskan.`,id);
  toast("✓ Claim diluluskan!");expanded=null;render();
};
window.doReject=async id=>{
  const note=document.getElementById("rNote")?.value||"";
  const c=claims.find(x=>x.id===id);
  await updateDoc(doc(db,"claims",id),{status:"rejected",reviewNote:note});
  if(c)await sendNotif(c.user,"❌ Claim Ditolak",`Claim "${c.purpose}" telah ditolak.${note?" Sebab: "+note:""}`,id);
  toast("Claim ditolak.");expanded=null;rejectFor=null;render();
};

window.delClaim=async id=>{
  if(!confirm("Padam claim ini?"))return;
  const c=claims.find(x=>x.id===id);
  await deleteDoc(doc(db,"claims",id));
  delete receiptMap[id];
  // Restore petty cash only if approved PC claim AND was current month when approved
  if(c&&(c.claimType==="pettycash"||c.budget==="pettycash")&&c.status==="approved"){
    const cd=c.date?new Date(c.date):new Date();
    const now=new Date();
    const isCurrent=cd.getMonth()===now.getMonth()&&cd.getFullYear()===now.getFullYear();
    if(isCurrent){
      const restored=(pc.balance||0)+(c.amount||0);
      await setDoc(doc(db,"settings","pettycash"),{...pc,balance:restored});
      toast("Claim dipadam. Baki PC dipulihkan: "+fmtRM(restored));
    }else{
      toast("Claim dipadam (rekod backdate, baki tidak terjejas).");
    }
  }else{
    toast("Claim dipadam.");
  }
  expanded=null;render();
};

    if(receipt){try{receiptUrl=await uploadToCloudinary(receipt,"expense");}catch(e){console.error("Upload err:",e);}}
    await addDoc(collection(db,"claims"),{user:session.name,claimType:"expense",budget:"expense",date,amount:parseFloat(amount),purpose,category,notes,receipt:receiptUrl,status:"pending",paid:false,submittedAt:serverTimestamp(),reviewNote:""});

    receipt=null;FS.expense={date:"",amount:"",cat:"",purpose:"",notes:""};view="claimSuccess";render();
  }catch(e){toast("Ralat! Cuba lagi.","err");btn.disabled=false;btn.textContent="Hantar untuk Audit";}
};

window.submitPC=async()=>{

    receipt=null;FS.pc={date:"",amount:"",cat:"",purpose:"",notes:""};view="claimSuccess";render();
  }catch(e){toast("Ralat! Cuba lagi.","err");btn.disabled=false;btn.textContent="Hantar Claim";}
};
